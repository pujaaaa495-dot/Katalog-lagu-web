<body>

<header>
<h1>KATALOG LAGU</h1>
<p>Halaman Transaksi</p>
</header>

<nav>
<a href="index-229.html">Beranda🏠</a>
<a href="profile-229.html">Profile👤</a>

</nav>

<div class="container">

<h2>Form Pembelian Lagu🎵</h2>

<form id="formTransaksi">

<input type="text" id="nama" placeholder="Nama Pembeli" required>

<select id="lagu">

<option value="">Pilih Lagu</option>

<option value="25000">Komang - Rp25.000</option>

<option value="30000">Hati-Hati di Jalan - Rp30.000</option>

<option value="28000">Sial - Rp28.000</option>

<option value="35000">Runtuh - Rp35.000</option>

<option value="32000">Tak Segampang Itu - Rp32.000</option>

</select>

<input type="number" id="jumlah" placeholder="Jumlah" required>

<button type="button" onclick="tambahData()">Tambah Transaksi</button>

</form>

<table id="tabel">

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Harga Lagu</th>

<th>Jumlah</th>

<th>Total</th>

<th>Aksi</th>

</tr>

</thead>

<tbody>

</tbody>

<tfoot>

<tr>

<td colspan="4">Total Seluruh Transaksi</td>

<td id="grandTotal">Rp0</td>

<td>-</td>

</tr>

</tfoot>

</table>

</div>

<footer>

<p>©2026 Katalog Lagu | By: Puja - NIM 229</p>

</footer>

<script>

let nomor=1;

let totalSemua=0;

function tambahData(){

let nama=document.getElementById("nama").value;

let lagu=document.getElementById("lagu");

let harga=parseInt(lagu.value);

let jumlah=parseInt(document.getElementById("jumlah").value);

if(nama=="" || lagu.value=="" || jumlah<=0){

alert("Silakan lengkapi data transaksi!");

return;

}

let total=harga*jumlah;

totalSemua+=total;

document.getElementById("grandTotal").innerHTML=
"Rp"+totalSemua.toLocaleString();

let tabel=document.getElementById("tabel").getElementsByTagName("tbody")[0];

let baris=tabel.insertRow();

baris.insertCell(0).innerHTML=nomor++;

baris.insertCell(1).innerHTML=nama;

baris.insertCell(2).innerHTML="Rp"+harga.toLocaleString();

baris.insertCell(3).innerHTML=jumlah;

baris.insertCell(4).innerHTML="Rp"+total.toLocaleString();

let aksi=baris.insertCell(5);

aksi.innerHTML="<button onclick='hapusBaris(this,"+total+")'>Hapus</button>";

document.getElementById("formTransaksi").reset();

}

function hapusBaris(btn,total){

if(confirm("Yakin ingin menghapus transaksi?")){

let row=btn.parentNode.parentNode;

row.parentNode.removeChild(row);

totalSemua-=total;

document.getElementById("grandTotal").innerHTML=
"Rp"+totalSemua.toLocaleString();

}

}

</script>
