<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Katalog Lagu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#71ab92,#269788);
}

/* Header */

header{
    background:#054e45;
    color:rgb(140, 203, 186);
    text-align:center;
    padding:25px;
}

header h1{
    font-size:38px;
}

/* Menu */

nav{
    background:#2a7d72;
    padding:15px;
}

nav ul{
    display:flex;
    justify-content:center;
    list-style:none;
}

nav ul li{
    margin:0 20px;
}

nav ul li a{
    color:rgb(224, 231, 228);
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

nav ul li a:hover{
    color:rgb(184, 184, 39);
}

/* Login */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:75vh;
}

.login-box{

    width:400px;
    background:rgb(178, 239, 221);
    padding:35px;
    border-radius:15px;
    box-shadow:0px 10px 25px rgba(176, 233, 54, 0.3);

}

.login-box h2{

    text-align:center;
    color:#134f41;
    margin-bottom:25px;

}

.login-box label{

    font-weight:bold;
    display:block;
    margin-top:15px;

}

.login-box input{

    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #03150d;
    border-radius:8px;
    font-size:15px;

}

.login-box input:focus{

    outline:none;
    border:2px solid #111d45;

}

button{

    width:100%;
    padding:12px;
    margin-top:25px;
    border:none;
    border-radius:8px;
    background:#1a7157;
    color:rgb(205, 219, 218);
    font-size:18px;
    cursor:pointer;

}

button:hover{

    background:#14c2a8;

}

footer{

    background:#0d4a3e;
    color:rgb(195, 207, 202);
    text-align:center;
    padding:15px;

}

@media(max-width:600px){

.login-box{
width:90%;
}

nav ul{
flex-direction:column;
text-align:center;
}

nav ul li{
margin:10px;
}

}

</style>

</head>

<body>

<header>

<h1>Katalog Lagu - Login</h1>

</header>

<nav>

<ul>

<li><a href="index-229.html">Beranda🏠</a></li>

<li><a href="profile-229.html">Profile👤</a></li>

<li><a href="transaksi-229.html">Transaksi💳</a></li>

<li><a href="login-229.html">Login🔐</a></li>

</ul>

</nav>

<div class="container">

<div class="login-box">

<h2>Form Login</h2>

<label>Username👤</label>

<input
type="text"
id="username"
placeholder="Masukkan Username">

<label>Password🔐</label>

<input
type="password"
id="password"
placeholder="Masukkan Password">

<button onclick="login()">

LOGIN

</button>

</div>

</div>

<footer>

<p>©2026 Katalog Lagu | By:Puja-NIM 229</p>

</footer>

<script>

function login(){

let username=document.getElementById("username").value.trim();

let password=document.getElementById("password").value.trim();

if(username==""){

alert("Username tidak boleh kosong!");

return;

}

if(password==""){

alert("Password tidak boleh kosong!");

return;

}

// Semua username & password diterima
alert("Selamat Datang, " + username + "!\nLogin Berhasil.");

window.location.href="index-229.html";

}

</script>

</body>
</html>
